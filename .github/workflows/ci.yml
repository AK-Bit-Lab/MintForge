name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - run: npm run lint

      - name: Install Clarinet
        run: |
          CLARINET_VERSION="v3.15.1"
          curl -sL "https://github.com/stx-labs/clarinet/releases/download/${CLARINET_VERSION}/clarinet-linux-x64-glibc.tar.gz" -o /tmp/clarinet.tar.gz
          tar -xzf /tmp/clarinet.tar.gz -C /tmp
          sudo mv /tmp/clarinet /usr/local/bin/clarinet
          chmod +x /usr/local/bin/clarinet
          clarinet --version

      - name: Run contract checks
        run: npm run contracts:check

      - run: npm test

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Build frontend
        run: cd frontend && npm run build
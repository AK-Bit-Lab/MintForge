# MintForge Clarinet Configuration
# This file defines the project structure and contract deployments for the MintForge ecosystem.
# See: https://docs.hiro.so/clarinet/advanced-topics/configuration

[project]
# Project metadata
name = 'mintforge'
description = 'A minimal NFT minting platform on Stacks'
authors = []
telemetry = false  # Set to true to send anonymous usage data to Hiro
cache_dir = './.cache'  # Directory for caching compiled contracts
requirements = []  # External contract requirements (none for this project)

# --- Trait Contracts (Archive) ---
# SIP standards implemented as traits for type checking and trait compliance.
# These are stored in archive/ as they are reference implementations, not deployed.

[contracts.sip-009-nft-trait-v-i28]
path = 'contracts/archive/sip-009-nft-trait-v-i28.clar'
clarity_version = 2
epoch = 2.4

[contracts.sip-010-trait-ft-standard-v-i28]
path = 'contracts/archive/sip-010-trait-ft-standard-v-i28.clar'
clarity_version = 2
epoch = 2.4

# --- Core Contracts ---
# Active contracts deployed to Stacks mainnet/testnet.

[contracts.minimint-core-v-i28]
# Core NFT contract implementing SIP-009 standard
path = 'contracts/minimint-core-v-i28.clar'
clarity_version = 2
epoch = 2.4

[contracts.minimint-token-v-i28]
# SIP-010 compliant reward token contract
path = 'contracts/minimint-token-v-i28.clar'
clarity_version = 2
epoch = 2.4

[contracts.minimint-hub-v-i28]
# Hub contract for staking, marketplace, and reward distribution
path = 'contracts/minimint-hub-v-i28.clar'
clarity_version = 2
epoch = 2.4
# Deployment order: core and token must be deployed before hub
depends_on = ["minimint-core-v-i28", "minimint-token-v-i28"]

# --- Static Analysis Configuration ---
# Automated code analysis passes run during `clarinet check`.

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
# Check checker settings for security analysis
strict = false  # Set to true for stricter checks
trusted_sender = false  # Don't assume tx-sender is trusted
trusted_caller = false  # Don't assume contract-caller is trusted
callee_filter = false  # Don't filter callee analysis

# --- Remote Data Configuration ---
# Settings for fetching data from Hiro API during development.

[repl.remote_data]
enabled = true
api_url = 'https://api.hiro.so'  # Hiro Stacks API endpoint
